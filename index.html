<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ObraCheck Pro v2.2 — Sistema de Asistencia</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f0e; --surface: #151918; --surface2: #1e2420; --border: #2a3330;
  --accent: #f97316; --green: #22c55e; --red: #ef4444; --text: #e8ede9; --muted: #6b7a70;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
.phone-wrap { width:100%; max-width:420px; margin:10px auto; padding:0 10px; }
.phone { background:var(--surface); border-radius:30px; border:1px solid var(--border); overflow:hidden; box-shadow:0 40px 80px rgba(0,0,0,0.7); min-height:88vh; display:flex; flex-direction:column; position: relative; }

.status-bar { display:flex; justify-content:space-between; padding:12px 20px; font-size:0.75rem; color:var(--muted); border-bottom:1px solid var(--border); background: #000; }
.screens { flex:1; overflow-y:auto; padding-bottom: 90px; }
.screen { display:none; animation: fadeIn 0.2s; }
.screen.active { display:block; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.screen-header { padding:20px; background: linear-gradient(to bottom, #1a1f1d, var(--surface)); border-bottom:1px solid var(--border); }
.screen-title { font-family:'Barlow Condensed', sans-serif; font-size:1.6rem; font-weight:900; color: var(--accent); text-transform: uppercase; }

.card { background:var(--surface2); border:1px solid var(--border); border-radius:16px; padding:16px; margin:12px; }
.obra-card { border-left: 4px solid var(--accent); cursor:pointer; }

.worker-item { display:flex; align-items:center; gap:12px; padding:12px 20px; border-bottom:1px solid var(--border); }
.avatar { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; background:var(--accent); color:#000; font-weight:900; }

.gps-indicator { padding:15px; border-radius:12px; margin:12px; text-align:center; font-weight:600; border:1px solid var(--border); }
.ok { background: rgba(34,197,94,0.1); color: var(--green); border-color: var(--green); }
.error { background: rgba(239,68,68,0.1); color: var(--red); border-color: var(--red); }

.btn { width:100%; padding:16px; border-radius:12px; border:none; font-family:'Barlow Condensed'; font-weight:800; cursor:pointer; margin-top:10px; display:flex; align-items:center; justify-content:center; gap:8px; }
.btn-primary { background:var(--accent); color:#000; }
.btn-primary:disabled { background: var(--muted); opacity: 0.5; cursor: not-allowed; }

.tabs { position:absolute; bottom:0; width:100%; display:flex; background:#000; border-top:1px solid var(--border); height: 75px; align-items: center; }
.tab { flex:1; border:none; background:none; color:var(--muted); font-size:0.65rem; text-transform:uppercase; cursor:pointer; }
.tab.active { color:var(--accent); font-weight:800; }

.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.85); display:none; align-items:center; justify-content:center; z-index:1000; padding:20px; }
.modal-overlay.open { display:flex; }
.modal { background:var(--surface); border-radius:20px; padding:25px; width:100%; max-width:350px; border:1px solid var(--border); }

.field { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:14px; color:var(--text); margin-bottom:10px; outline:none; }
</style>
</head>
<body>

<div class="phone-wrap">
  <div class="phone">
    <div class="status-bar">
      <span id="live-clock">00:00:00</span>
      <span style="color:var(--green)">● GPS PRECISO (MÁX)</span>
    </div>

    <div class="screens">
      <div class="screen active" id="scr-obras">
        <div class="screen-header"><div class="screen-title">Mis Obras</div></div>
        <div id="list-obras"></div>
      </div>

      <div class="screen" id="scr-marcar">
        <div class="screen-header">
            <div class="screen-title">Asistencia</div>
            <p id="active-obra-name" style="color:var(--accent)">Selecciona una obra primero</p>
        </div>
        <div id="gps-ui" class="gps-indicator">📡 Verificación pendiente</div>
        <div style="padding:0 15px">
            <button class="btn btn-primary" onclick="verificarUbicacion()">📍 VALIDAR UBICACIÓN ACTUAL</button>
            <div id="form-registro" style="display:none; margin-top:20px">
                <select class="field" id="select-worker" onchange="validarBotones()"></select>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
                    <button class="btn" id="btn-entrada" style="background:var(--green); color:#000" onclick="registrar('ENTRADA')" disabled>ENTRADA</button>
                    <button class="btn" id="btn-salida" style="background:var(--red); color:#fff" onclick="registrar('SALIDA')" disabled>SALIDA</button>
                </div>
            </div>
        </div>
      </div>

      <div class="screen" id="scr-reporte">
        <div class="screen-header"><div class="screen-title">Personal Hoy</div></div>
        <div class="card" style="text-align:center">
            <button class="btn btn-primary" onclick="exportarCSV()">📊 EXPORTAR REPORTE (.CSV)</button>
        </div>
        <div id="worker-status-list"></div>
      </div>
    </div>

    <nav class="tabs">
      <button class="tab active" onclick="tab('obras')">🏗️<br>Obras</button>
      <button class="tab" onclick="tab('marcar')">✅<br>Marcar</button>
      <button class="tab" onclick="tab('reporte')">📊<br>Reporte</button>
    </nav>
  </div>
</div>

<button style="position:fixed; bottom:95px; right:calc(50% - 190px); width:56px; height:56px; border-radius:18px; background:var(--accent); border:none; font-size:1.8rem; z-index:100; color:#000; font-weight:bold;" onclick="openM('m-obra')">+</button>

<div class="modal-overlay" id="m-obra">
  <div class="modal">
    <h3 style="color:var(--accent)">NUEVA OBRA</h3><br>
    <input class="field" id="new-oname" placeholder="Nombre: Ej. Casa Pérez">
    <button class="btn btn-primary" onclick="guardarObra()">📍 CAPTURAR GPS REAL</button>
    <button class="btn" style="background:transparent; color:var(--muted)" onclick="closeM('m-obra')">CANCELAR</button>
  </div>
</div>

<script>
let data = {
    obras: JSON.parse(localStorage.getItem('ob_obras') || '[]'),
    logs: JSON.parse(localStorage.getItem('ob_logs') || '[]'),
    workers: ["Juan Pérez", "Miguel Soto", "Carlos Ruiz", "Andrés Silva", "Roberto Díaz"]
};
let currentObra = null;

function tab(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('scr-' + name).classList.add('active');
    event.currentTarget.classList.add('active');
    if(name === 'reporte') renderWorkersStatus();
}

function guardarObra() {
    const name = document.getElementById('new-oname').value;
    if(!name) return;
    navigator.geolocation.getCurrentPosition(pos => {
        data.obras.push({ 
            id: Date.now(), 
            name, 
            lat: pos.coords.latitude, 
            lon: pos.coords.longitude, 
            radio: 25 // 25 metros de margen
        });
        localStorage.setItem('ob_obras', JSON.stringify(data.obras));
        renderObras(); closeM('m-obra');
        alert("Obra creada con éxito en tu posición actual.");
    }, () => alert("Error: Activa el GPS"), { enableHighAccuracy: true });
}

function renderObras() {
    document.getElementById('list-obras').innerHTML = data.obras.map(o => `
        <div class="card obra-card" onclick="selectObra(${o.id})"><strong>${o.name}</strong></div>
    `).join('');
}

function selectObra(id) {
    currentObra = data.obras.find(o => o.id === id);
    document.getElementById('active-obra-name').textContent = "📍 " + currentObra.name;
    const sel = document.getElementById('select-worker');
    sel.innerHTML = '<option value="">-- Selecciona Trabajador --</option>' + data.workers.map(w => `<option value="${w}">${w}</option>`).join('');
    tab('marcar');
}

function validarBotones() {
    const val = document.getElementById('select-worker').value;
    document.getElementById('btn-entrada').disabled = !val;
    document.getElementById('btn-salida').disabled = !val;
}

function verificarUbicacion() {
    if(!currentObra) return alert("Selecciona una obra primero");
    const ui = document.getElementById('gps-ui');
    ui.textContent = "🛰️ Buscando señal precisa...";
    
    // MEJORA: Sin caché, señal real, tiempo límite de 10 seg.
    navigator.geolocation.getCurrentPosition(pos => {
        const d = Math.sqrt(Math.pow(pos.coords.latitude - currentObra.lat, 2) + Math.pow(pos.coords.longitude - currentObra.lon, 2)) * 111320;
        if(d <= currentObra.radio) {
            ui.textContent = `✅ EN OBRA (${Math.round(d)}m)`;
            ui.className = "gps-indicator ok";
            document.getElementById('form-registro').style.display = 'block';
        } else {
            ui.textContent = `❌ FUERA DE RANGO (${Math.round(d)}m)`;
            ui.className = "gps-indicator error";
            document.getElementById('form-registro').style.display = 'none';
        }
    }, () => alert("No se pudo obtener el GPS"), { 
        enableHighAccuracy: true, 
        timeout: 10000, 
        maximumAge: 0 
    });
}

function registrar(tipo) {
    const worker = document.getElementById('select-worker').value;
    const log = { 
        worker, 
        tipo, 
        obra: currentObra.name, 
        hora: new Date().toLocaleTimeString('es-CL'), 
        fecha: new Date().toLocaleDateString('es-CL') 
    };
    data.logs.push(log);
    localStorage.setItem('ob_logs', JSON.stringify(data.logs));
    alert(`${tipo} registrada para ${worker}`);
    tab('reporte');
}

function renderWorkersStatus() {
    const container = document.getElementById('worker-status-list');
    container.innerHTML = data.workers.map(w => {
        const lastLog = data.logs.filter(l => l.worker === w).slice(-1)[0];
        const status = lastLog ? (lastLog.tipo === 'ENTRADA' ? `<span style="color:var(--green)">Entró: ${lastLog.hora}</span>` : `<span style="color:var(--muted)">Salió: ${lastLog.hora}</span>`) : 'Sin actividad';
        return `<div class="worker-item"><div class="avatar">${w[0]}</div><div style="flex:1"><strong>${w}</strong><br><small>${status}</small></div></div>`;
    }).join('');
}

function exportarCSV() {
    if(data.logs.length === 0) return alert("No hay datos");
    let csv = "Fecha;Hora;Obra;Trabajador;Tipo\n";
    data.logs.forEach(l => { csv += `${l.fecha};${l.hora};${l.obra};${l.worker};${l.tipo}\n`; });
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = `Reporte_${new Date().toLocaleDateString()}.csv`;
    link.click();
}

function openM(id) { document.getElementById(id).classList.add('open'); }
function closeM(id) { document.getElementById(id).classList.remove('open'); }
setInterval(() => document.getElementById('live-clock').textContent = new Date().toLocaleTimeString(), 1000);
renderObras();
</script>
</body>
</html>
